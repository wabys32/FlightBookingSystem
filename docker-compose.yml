services:
  postgres:
    image: postgres:18-alpine
    container_name: flight-booking-postgres
    environment:
      POSTGRES_DB: flight_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: flight-booking-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flight_booking
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: yourVerySecretKeyYourVerySecretKey123456
      JWT_EXPIRATION: 86400000
      FILE_STORAGE_DIR: /app/uploads
      LOG_FILE_NAME: /app/logs/flight-booking-system.log
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
  app_uploads:
  app_logs:
