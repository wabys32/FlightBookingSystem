spring.application.name=flight-booking-system

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.root=INFO
logging.level.com.arthurtokarev.flightbookingsystem=INFO
logging.file.name=logs/flight-booking-system.log

jwt.secret=yourVerySecretKeyYourVerySecretKey123456
jwt.expiration=86400000

file.storage-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
